# LSTM Anomaly Detection for VictoriaMetrics
# Docker-oriented configuration (service DNS names instead of localhost)

reader:
  datasource_url: "http://victoriametrics:8428"
  sampling_period: "1m"
  queries:
    cpu_usage:
      expr: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[5m])) by (instance)'
    memory_usage:
      expr: '(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100'

model:
  sequence_length: 120
  hidden_size: 128
  num_layers: 2
  dropout: 0.1
  epochs: 100
  learning_rate: 0.0005
  threshold_sigma: 5.0
  calibration_ratio: 0.2
  min_threshold: 0.02
  checkpoint_max_age_days: 30
  checkpoint_max_files: 500
  delete_orphan_checkpoints: true

writer:
  datasource_url: "http://victoriametrics:8428"
  metric_format:
    __name__: "lstm_anomaly_$VAR"
    for: "$QUERY_KEY"

scheduler:
  fit_every: "15m"
  infer_every: "1m"
  fit_window: "3d"

checkpoint_dir: "./model_checkpoints"
