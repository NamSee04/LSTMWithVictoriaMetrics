# LSTM Anomaly Detection for VictoriaMetrics
# Configuration file

reader:
  datasource_url: "http://localhost:8428"
  sampling_period: "1m"
  queries:
    cpu_usage:
      expr: 'avg(rate(node_cpu_seconds_total{mode!="idle"}[5m])) by (instance)'
    memory_usage:
      expr: '(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100'

model:
  sequence_length: 60       # lookback window (number of data points)
  hidden_size: 64           # LSTM hidden layer size
  num_layers: 2             # number of stacked LSTM layers
  dropout: 0.2              # dropout rate between LSTM layers
  epochs: 50                # training epochs per fit cycle
  learning_rate: 0.001      # Adam optimizer learning rate
  threshold_sigma: 3.0      # anomaly threshold: mean_error + sigma * std_error

writer:
  datasource_url: "http://localhost:8428"
  metric_format:
    __name__: "lstm_anomaly_$VAR"
    for: "$QUERY_KEY"

scheduler:
  fit_every: "1h"           # retrain model every hour
  infer_every: "1m"         # run inference every minute
  fit_window: "1d"          # use last 24h of data for training
