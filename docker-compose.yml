services:
  lstm-anomaly:
    image: namsee04/lstm-anomaly-detector:latest
    container_name: lstm-anomaly-detector
    volumes:
      - ./config.docker.yaml:/app/config.yaml:ro
      - ./model_checkpoints:/app/model_checkpoints
      - ./alerts:/app/alerts:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
